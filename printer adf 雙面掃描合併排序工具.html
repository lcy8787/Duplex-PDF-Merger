<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duplex PDF Merger | 雙面掃描合併工具</title>
    <!-- 引入 pdf-lib.js -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --primary-hover: #2c5282;
            --bg-color: #edf2f7;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --border-color: #cbd5e0;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 35px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 550px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 22px;
            margin: 0;
            color: var(--text-main);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .lang-btn {
            width: auto;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: bold;
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn:hover {
            background-color: var(--primary-color);
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-main);
        }

        .file-input-wrapper {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 12px;
            background-color: #f7fafc;
            transition: all 0.2s ease;
        }

        .file-input-wrapper:hover, .file-input-wrapper:focus-within {
            border-color: var(--primary-color);
            background-color: #ebf8ff;
        }

        input[type="file"] {
            width: 100%;
            font-size: 14px;
            cursor: pointer;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        .options {
            margin: 15px 0 25px 0;
            display: flex;
            align-items: center;
            background-color: #f7fafc;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .options input[type="checkbox"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .options label {
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin: 0;
            user-select: none;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .submit-btn:hover {
            background-color: var(--primary-hover);
        }

        .submit-btn:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
        }

        .note {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 25px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 data-i18n="title">PDF 雙面掃描合併工具</h1>
            <button id="langToggle" class="lang-btn" onclick="toggleLanguage()">EN</button>
        </div>

        <div class="form-group">
            <label for="oddPdf" data-i18n="oddLabel">📄 檔案 A：奇數頁 (Odd Pages 1, 3, 5...)</label>
            <div class="file-input-wrapper">
                <input type="file" id="oddPdf" accept="application/pdf">
            </div>
        </div>

        <div class="form-group">
            <label id="evenLabel" for="evenPdf">📄 檔案 B：偶數頁 (Even Pages 6, 4, 2...)</label>
            <div class="file-input-wrapper">
                <input type="file" id="evenPdf" accept="application/pdf">
            </div>
        </div>

        <div class="options">
            <input type="checkbox" id="reverseEven" checked>
            <label for="reverseEven" data-i18n="reverseLabel">偶數頁為倒序 (Reverse even pages)</label>
        </div>

        <div class="form-group">
            <label for="outputFileName" data-i18n="outputLabel">💾 導出檔案名稱</label>
            <input type="text" id="outputFileName" placeholder="請輸入導出的檔案名稱">
        </div>

        <button id="mergeBtn" class="submit-btn" data-i18n="btnMerge" onclick="mergePdfs()">合併並下載</button>

        <p class="note" data-i18n="note">🔒 離線處理，確保文件隱私安全</p>
    </div>

    <script>
        // --- 語言與翻譯設定 ---
        const translations = {
            zh: {
                title: "PDF 雙面掃描合併工具",
                oddLabel: "📄 檔案 A：奇數頁 (1, 3, 5...)",
                evenLabelNormal: "📄 檔案 B：偶數頁 (2, 4, 6...)",
                evenLabelReverse: "📄 檔案 B：偶數頁 (6, 4, 2...)",
                reverseLabel: "偶數頁為倒序",
                outputLabel: "💾 導出檔案名稱",
                outputPlaceholder: "請輸入導出的檔案名稱",
                btnMerge: "合併並下載",
                btnProcessing: "處理中...",
                note: "🔒 離線處理，確保文件隱私安全",
                alertNoFiles: "請先選擇「奇數頁」與「偶數頁」的 PDF 檔案！",
                alertError: "合併失敗！請確認上傳的檔案為有效的 PDF 格式。",
                defaultFileA: "檔案A",
                defaultFileB: "檔案B"
            },
            en: {
                title: "Duplex PDF Merger",
                oddLabel: "📄 File A: Odd Pages (1, 3, 5...)",
                evenLabelNormal: "📄 File B: Even Pages (2, 4, 6...)",
                evenLabelReverse: "📄 File B: Even Pages (6, 4, 2...)",
                reverseLabel: "Reverse even pages",
                outputLabel: "💾 Export File Name",
                outputPlaceholder: "Enter export file name",
                btnMerge: "Merge & Download",
                btnProcessing: "Processing...",
                note: "🔒 Offline processing, ensuring document privacy",
                alertNoFiles: 'Please select both "Odd Pages" and "Even Pages" PDF files!',
                alertError: "Merge failed! Please ensure the uploaded files are valid PDFs.",
                defaultFileA: "FileA",
                defaultFileB: "FileB"
            }
        };

        let currentLang = 'zh'; // 預設語言

        // DOM 元素參考
        const oddFileInput = document.getElementById('oddPdf');
        const evenFileInput = document.getElementById('evenPdf');
        const reverseEvenCheckbox = document.getElementById('reverseEven');
        const evenLabel = document.getElementById('evenLabel');
        const outputFileNameInput = document.getElementById('outputFileName');
        const mergeBtn = document.getElementById('mergeBtn');
        const langToggleBtn = document.getElementById('langToggle');

        // 切換語言功能
        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            langToggleBtn.innerText = currentLang === 'zh' ? 'EN' : '中文';
            updateUI();
        }

        // 更新介面語言
        function updateUI() {
            const dict = translations[currentLang];
            
            // 更新帶有 data-i18n 的靜態元素
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) {
                    el.innerText = dict[key];
                }
            });

            // 更新 Placeholder
            outputFileNameInput.placeholder = dict.outputPlaceholder;

            // 更新動態標籤
            updateEvenLabel();
            updateFileName();
        }

        // 動態更新偶數頁標籤文字
        function updateEvenLabel() {
            const dict = translations[currentLang];
            if (reverseEvenCheckbox.checked) {
                evenLabel.innerText = dict.evenLabelReverse;
            } else {
                evenLabel.innerText = dict.evenLabelNormal;
            }
        }

        // 動態產生預設導出檔名
        function updateFileName() {
            const dict = translations[currentLang];
            let nameA = dict.defaultFileA;
            let nameB = dict.defaultFileB;

            if (oddFileInput.files.length > 0) {
                nameA = oddFileInput.files[0].name.replace(/\.[^/.]+$/, ""); // 移除副檔名
            }
            if (evenFileInput.files.length > 0) {
                nameB = evenFileInput.files[0].name.replace(/\.[^/.]+$/, ""); // 移除副檔名
            }

            outputFileNameInput.value = `merged_${nameA}_${nameB}.pdf`;
        }

        // 綁定事件監聽器
        reverseEvenCheckbox.addEventListener('change', updateEvenLabel);
        oddFileInput.addEventListener('change', updateFileName);
        evenFileInput.addEventListener('change', updateFileName);

        // 初始化介面
        updateUI();

        // 核心合併邏輯
        async function mergePdfs() {
            const dict = translations[currentLang];

            if (!oddFileInput.files[0] || !evenFileInput.files[0]) {
                alert(dict.alertNoFiles);
                return;
            }

            let finalFileName = outputFileNameInput.value.trim();
            if (!finalFileName) {
                finalFileName = "merged_document.pdf";
            } else if (!finalFileName.toLowerCase().endsWith('.pdf')) {
                finalFileName += ".pdf";
            }

            try {
                mergeBtn.innerText = dict.btnProcessing;
                mergeBtn.disabled = true;

                const oddBytes = await oddFileInput.files[0].arrayBuffer();
                const evenBytes = await evenFileInput.files[0].arrayBuffer();

                const { PDFDocument } = PDFLib;
                const oddDoc = await PDFDocument.load(oddBytes);
                const evenDoc = await PDFDocument.load(evenBytes);
                
                const mergedDoc = await PDFDocument.create();

                const oddCount = oddDoc.getPageCount();
                const evenCount = evenDoc.getPageCount();

                const oddIndices = Array.from({ length: oddCount }, (_, i) => i);
                let evenIndices = Array.from({ length: evenCount }, (_, i) => i);

                // 偶數頁倒序處理
                if (reverseEvenCheckbox.checked) {
                    evenIndices.reverse();
                }

                const copiedOddPages = await mergedDoc.copyPages(oddDoc, oddIndices);
                const copiedEvenPages = await mergedDoc.copyPages(evenDoc, evenIndices);

                const maxLength = Math.max(oddCount, evenCount);
                for (let i = 0; i < maxLength; i++) {
                    if (i < oddCount) mergedDoc.addPage(copiedOddPages[i]);
                    if (i < evenCount) mergedDoc.addPage(copiedEvenPages[i]);
                }

                const mergedPdfBytes = await mergedDoc.save();

                // 觸發下載
                const blob = new Blob([mergedPdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = finalFileName;
                document.body.appendChild(a);
                a.click();
                
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

            } catch (error) {
                console.error(error);
                alert(dict.alertError);
            } finally {
                mergeBtn.innerText = dict.btnMerge;
                mergeBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
