<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 雙面掃描合併工具</title>
    <!-- 引入 pdf-lib.js -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --primary-hover: #2c5282;
            --bg-color: #edf2f7;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --border-color: #cbd5e0;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 35px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 550px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 30px;
            color: var(--text-main);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-main);
        }

        .file-input-wrapper {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 12px;
            background-color: #f7fafc;
            transition: all 0.2s ease;
        }

        .file-input-wrapper:hover, .file-input-wrapper:focus-within {
            border-color: var(--primary-color);
            background-color: #ebf8ff;
        }

        input[type="file"] {
            width: 100%;
            font-size: 14px;
            cursor: pointer;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        .options {
            margin: 15px 0 25px 0;
            display: flex;
            align-items: center;
            background-color: #f7fafc;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .options input[type="checkbox"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .options label {
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin: 0;
            user-select: none;
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
        }

        .note {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 25px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>PDF 雙面掃描合併工具</h1>

        <div class="form-group">
            <label for="oddPdf">📄 檔案 A：奇數頁 (Odd Pages 1, 3, 5...)</label>
            <div class="file-input-wrapper">
                <input type="file" id="oddPdf" accept="application/pdf">
            </div>
        </div>

        <div class="form-group">
            <label id="evenLabel" for="evenPdf">📄 檔案 B：偶數頁 (Even Pages 6, 4, 2...)</label>
            <div class="file-input-wrapper">
                <input type="file" id="evenPdf" accept="application/pdf">
            </div>
        </div>

        <div class="options">
            <input type="checkbox" id="reverseEven" checked>
            <label for="reverseEven">偶數頁為倒序 (Reverse even pages)</label>
        </div>

        <div class="form-group">
            <label for="outputFileName">💾 導出檔案名稱</label>
            <input type="text" id="outputFileName" value="merged_document.pdf" placeholder="請輸入導出的檔案名稱">
        </div>

        <button id="mergeBtn" onclick="mergePdfs()">合併並下載</button>

        <p class="note">🔒 離線處理，確保文件隱私安全</p>
    </div>

    <script>
        const oddFileInput = document.getElementById('oddPdf');
        const evenFileInput = document.getElementById('evenPdf');
        const reverseEvenCheckbox = document.getElementById('reverseEven');
        const evenLabel = document.getElementById('evenLabel');
        const outputFileNameInput = document.getElementById('outputFileName');
        const mergeBtn = document.getElementById('mergeBtn');

        // 動態更新偶數頁標籤文字
        function updateEvenLabel() {
            if (reverseEvenCheckbox.checked) {
                evenLabel.innerText = "📄 檔案 B：偶數頁 (Even Pages 6, 4, 2...)";
            } else {
                evenLabel.innerText = "📄 檔案 B：偶數頁 (Even Pages 2, 4, 6...)";
            }
        }

        // 動態產生預設導出檔名
        function updateFileName() {
            let nameA = "odd";
            let nameB = "even";

            if (oddFileInput.files.length > 0) {
                nameA = oddFileInput.files[0].name.replace(/\.[^/.]+$/, ""); // 移除副檔名
            }
            if (evenFileInput.files.length > 0) {
                nameB = evenFileInput.files[0].name.replace(/\.[^/.]+$/, ""); // 移除副檔名
            }

            if (oddFileInput.files.length > 0 || evenFileInput.files.length > 0) {
                outputFileNameInput.value = `merged_${nameA}_${nameB}.pdf`;
            }
        }

        // 綁定事件監聽器
        reverseEvenCheckbox.addEventListener('change', updateEvenLabel);
        oddFileInput.addEventListener('change', updateFileName);
        evenFileInput.addEventListener('change', updateFileName);

        // 初始化標籤
        updateEvenLabel();

        // 核心合併邏輯
        async function mergePdfs() {
            if (!oddFileInput.files[0] || !evenFileInput.files[0]) {
                alert('請先選擇「奇數頁」與「偶數頁」的 PDF 檔案！');
                return;
            }

            let finalFileName = outputFileNameInput.value.trim();
            if (!finalFileName) {
                finalFileName = "merged_document.pdf";
            } else if (!finalFileName.toLowerCase().endsWith('.pdf')) {
                finalFileName += ".pdf";
            }

            try {
                mergeBtn.innerText = '處理中...';
                mergeBtn.disabled = true;

                const oddBytes = await oddFileInput.files[0].arrayBuffer();
                const evenBytes = await evenFileInput.files[0].arrayBuffer();

                const { PDFDocument } = PDFLib;
                const oddDoc = await PDFDocument.load(oddBytes);
                const evenDoc = await PDFDocument.load(evenBytes);
                
                const mergedDoc = await PDFDocument.create();

                const oddCount = oddDoc.getPageCount();
                const evenCount = evenDoc.getPageCount();

                const oddIndices = Array.from({ length: oddCount }, (_, i) => i);
                let evenIndices = Array.from({ length: evenCount }, (_, i) => i);

                // 偶數頁倒序處理
                if (reverseEvenCheckbox.checked) {
                    evenIndices.reverse();
                }

                const copiedOddPages = await mergedDoc.copyPages(oddDoc, oddIndices);
                const copiedEvenPages = await mergedDoc.copyPages(evenDoc, evenIndices);

                const maxLength = Math.max(oddCount, evenCount);
                for (let i = 0; i < maxLength; i++) {
                    if (i < oddCount) mergedDoc.addPage(copiedOddPages[i]);
                    if (i < evenCount) mergedDoc.addPage(copiedEvenPages[i]);
                }

                const mergedPdfBytes = await mergedDoc.save();

                // 觸發下載
                const blob = new Blob([mergedPdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = finalFileName;
                document.body.appendChild(a);
                a.click();
                
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

            } catch (error) {
                console.error(error);
                alert('合併失敗！請確認上傳的檔案為有效的 PDF 格式。');
            } finally {
                mergeBtn.innerText = '合併並下載';
                mergeBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
