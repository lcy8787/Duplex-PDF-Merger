<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 雙面掃描合併工具</title>
    <!-- 引入 pdf-lib.js -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --primary-color: #4A90E2;
            --primary-hover: #357ABD;
            --bg-color: #F5F7FA;
            --card-bg: #FFFFFF;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #E4E7EB;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .upload-group {
            margin-bottom: 20px;
        }

        .upload-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .file-input-wrapper {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            background-color: #FAFAFA;
            transition: border-color 0.3s ease;
        }

        .file-input-wrapper:hover {
            border-color: var(--primary-color);
        }

        input[type="file"] {
            width: 100%;
            font-size: 14px;
        }

        .options {
            margin: 20px 0 30px 0;
            background-color: #F0F4F8;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
        }

        .options input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .options label {
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #A0C3EB;
            cursor: not-allowed;
        }

        .note {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>PDF 雙面掃描合併</h1>
        <p class="subtitle">檔案完全在您的瀏覽器本地處理，保障隱私安全</p>

        <div class="upload-group">
            <label for="oddPdf">📄 檔案 A：奇數頁 (Odd Pages 1, 3, 5...)</label>
            <div class="file-input-wrapper">
                <input type="file" id="oddPdf" accept="application/pdf">
            </div>
        </div>

        <div class="upload-group">
            <label for="evenPdf">📄 檔案 B：偶數頁 (Even Pages 2, 4, 6...)</label>
            <div class="file-input-wrapper">
                <input type="file" id="evenPdf" accept="application/pdf">
            </div>
        </div>

        <div class="options">
            <input type="checkbox" id="reverseEven" checked>
            <label for="reverseEven">偶數頁為倒序 (Reverse even pages)<br><small style="color:#666; font-weight:normal;">若從自動送稿機(ADF)掃描背面，通常需勾選此項</small></label>
        </div>

        <button id="mergeBtn" onclick="mergePdfs()">合併並下載</button>

        <p class="note">✅ 使用開源 pdf-lib 技術，無需上傳至任何伺服器。</p>
    </div>

    <script>
        async function mergePdfs() {
            const oddFileInput = document.getElementById('oddPdf');
            const evenFileInput = document.getElementById('evenPdf');
            const reverseEven = document.getElementById('reverseEven').checked;
            const mergeBtn = document.getElementById('mergeBtn');

            // 防呆機制：檢查是否已上傳檔案
            if (!oddFileInput.files[0] || !evenFileInput.files[0]) {
                alert('請先選擇「奇數頁」與「偶數頁」的 PDF 檔案！');
                return;
            }

            try {
                // 改變按鈕狀態
                mergeBtn.innerText = '處理中，請稍候...';
                mergeBtn.disabled = true;

                // 讀取檔案轉換為 ArrayBuffer
                const oddBytes = await oddFileInput.files[0].arrayBuffer();
                const evenBytes = await evenFileInput.files[0].arrayBuffer();

                // 使用 pdf-lib 載入 PDF
                const { PDFDocument } = PDFLib;
                const oddDoc = await PDFDocument.load(oddBytes);
                const evenDoc = await PDFDocument.load(evenBytes);
                
                // 創建新的空白 PDF
                const mergedDoc = await PDFDocument.create();

                const oddCount = oddDoc.getPageCount();
                const evenCount = evenDoc.getPageCount();

                // 準備要複製的頁碼陣列 (0-indexed)
                const oddIndices = Array.from({ length: oddCount }, (_, i) => i);
                let evenIndices = Array.from({ length: evenCount }, (_, i) => i);

                // 如果勾選倒序，將偶數頁的頁碼陣列反轉
                if (reverseEven) {
                    evenIndices.reverse();
                }

                // 一次性複製所需頁面，提高效能
                const copiedOddPages = await mergedDoc.copyPages(oddDoc, oddIndices);
                const copiedEvenPages = await mergedDoc.copyPages(evenDoc, evenIndices);

                // 交錯合併頁面
                const maxLength = Math.max(oddCount, evenCount);
                for (let i = 0; i < maxLength; i++) {
                    if (i < oddCount) {
                        mergedDoc.addPage(copiedOddPages[i]);
                    }
                    if (i < evenCount) {
                        mergedDoc.addPage(copiedEvenPages[i]);
                    }
                }

                // 將合併後的 PDF 儲存為 Bytes
                const mergedPdfBytes = await mergedDoc.save();

                // 觸發下載
                const blob = new Blob([mergedPdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'Merged_Document.pdf';
                document.body.appendChild(a);
                a.click();
                
                // 清理記憶體與 DOM
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

            } catch (error) {
                console.error(error);
                alert('合併過程中發生錯誤，請確保上傳的是有效的 PDF 檔案。');
            } finally {
                // 恢復按鈕狀態
                mergeBtn.innerText = '合併並下載';
                mergeBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
