<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duplex PDF Merger | 雙面掃描合併工具</title>

    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/preview.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 data-i18n="title">PDF 雙面掃描合併工具</h1>
            <button id="langToggle" class="lang-btn">EN</button>
        </div>

        <div class="form-group">
            <label for="oddPdf" data-i18n="oddLabel">📄 檔案 A：奇數頁 (1, 3, 5...)</label>
            <div class="file-input-wrapper">
                <input type="file" id="oddPdf" accept="application/pdf">
            </div>
        </div>

        <div class="form-group">
            <label id="evenLabel" for="evenPdf">📄 檔案 B：偶數頁 (6, 4, 2...)</label>
            <div class="file-input-wrapper">
                <input type="file" id="evenPdf" accept="application/pdf">
            </div>
        </div>

        <div class="options">
            <input type="checkbox" id="reverseEven" checked>
            <label for="reverseEven" data-i18n="reverseLabel">偶數頁為倒序</label>
        </div>

        <div class="form-group">
            <label for="outputFileName" data-i18n="outputLabel">💾 導出檔案名稱</label>
            <input type="text" id="outputFileName" placeholder="請輸入導出的檔案名稱">
        </div>

        <button id="mergeBtn" class="submit-btn" data-i18n="btnMerge">合併並下載</button>

        <!-- Batch Merge Section -->
        <div class="batch-section" style="margin-top: 30px; padding: 20px; border: 2px dashed #ccc; border-radius: 8px;">
            <h3 style="margin: 0 0 15px 0;" data-i18n="batchMergeTitle">批量合併</h3>
            <div class="batch-actions" style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button id="addBatchBtn" class="batch-add-btn" style="flex: 1; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;">
                    <span data-i18n="addToBatch">+ 添加到批次</span>
                </button>
                <button id="mergeBatchAllBtn" class="batch-merge-all-btn" disabled style="flex: 1; padding: 10px; background: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer; opacity: 0.5;">
                    <span data-i18n="mergeBatchAll">🚀 批量合併全部</span>
                </button>
            </div>
            <div id="batchItemsContainer" class="batch-items-container" style="max-height: 200px; overflow-y: auto; background: #f5f5f5; border-radius: 5px; padding: 10px;">
                <p class="empty-message" style="text-align: center; color: #999; margin: 0;">No batch items added yet</p>
            </div>
        </div>

        <!-- Progress Bar -->
        <div id="progressWrapper" class="merge-progress-wrapper">
            <div class="progress-label">Processing...</div>
            <div class="progress-bar">
                <div id="progressBar" class="progress-bar-fill animating"></div>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <div class="progress-details"></div>
                <div id="progressPercent" class="progress-percentage">0%</div>
            </div>
        </div>

        <!-- PDF Preview Section -->
        <div class="preview-section" style="display: none;">
            <div class="preview-panel">
                <div class="preview-panel-header" data-i18n="oddLabel">Odd Pages Preview</div>
                <div id="previewOddContainer" class="preview-canvas-wrapper"></div>
            </div>
            <div class="preview-panel">
                <div class="preview-panel-header" data-i18n="evenLabel">Even Pages Preview</div>
                <div id="previewEvenContainer" class="preview-canvas-wrapper"></div>
            </div>
        </div>

        <p class="note" data-i18n="note">🔒 離線處理，確保文件隱私安全</p>
    </div>

    <!-- Application Entry Point (ES6 Module) -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
